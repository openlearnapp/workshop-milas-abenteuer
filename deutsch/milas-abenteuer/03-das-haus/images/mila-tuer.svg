<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="warmLight" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#ffd700" stop-opacity="0.3"/><stop offset="100%" stop-color="#ff8c00" stop-opacity="0.05"/></linearGradient>
    <style>
      .glow{animation:gl 2s ease-in-out infinite}@keyframes gl{0%,100%{opacity:.6}50%{opacity:1}}
      .hair{animation:hb 3s ease-in-out infinite}@keyframes hb{0%,100%{transform:rotate(0)}50%{transform:rotate(2deg)}}
    </style>
  </defs>
  <rect width="400" height="280" fill="#0f1e30"/>
  <!-- Hauswand (Nahaufnahme) -->
  <rect x="120" y="40" width="280" height="240" fill="#6a5a40"/>
  <rect x="120" y="40" width="280" height="240" fill="#7a6a4a" opacity="0.5"/>
  <!-- Holzmaserung -->
  <line x1="180" y1="40" x2="180" y2="280" stroke="#5a4a30" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="40" x2="260" y2="280" stroke="#5a4a30" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="40" x2="340" y2="280" stroke="#5a4a30" stroke-width="1" opacity="0.3"/>
  <!-- Tür -->
  <rect x="220" y="100" width="80" height="140" rx="4" fill="#4a3a20"/>
  <rect x="225" y="105" width="70" height="130" rx="3" fill="#5a4a30"/>
  <circle cx="285" cy="170" r="4" fill="#c8a84a"/>
  <!-- Warmes Licht aus der Tür (leicht offen) -->
  <rect x="222" y="102" width="8" height="136" fill="url(#warmLight)" class="glow"/>
  <!-- Fenster mit warmem Licht -->
  <rect x="140" y="70" width="50" height="45" rx="2" fill="#2a3a5a"/>
  <rect x="143" y="73" width="44" height="39" rx="1" fill="#ffd700" opacity="0.5" class="glow"/>
  <line x1="165" y1="73" x2="165" y2="112" stroke="#5a4a30" stroke-width="2"/>
  <line x1="143" y1="92" x2="187" y2="92" stroke="#5a4a30" stroke-width="2"/>
  <!-- Ranken an der Wand -->
  <path d="M120,100 Q130,80 140,90 Q150,70 155,85" stroke="#3a6a2a" stroke-width="2" fill="none"/>
  <circle cx="140" cy="88" r="3" fill="#4a8a3a" opacity="0.6"/>
  <circle cx="155" cy="83" r="2" fill="#4a8a3a" opacity="0.5"/>
  <!-- Mila vor der Tür -->
  <g transform="translate(200,225)">
    <ellipse cx="0" cy="-24" rx="9" ry="11" fill="#8B5E3C" class="hair"/>
    <circle cx="0" cy="-26" r="8" fill="#FDDCB5"/>
    <circle cx="-3" cy="-28" r="1.3" fill="#3a2a1a"/><circle cx="3" cy="-28" r="1.3" fill="#3a2a1a"/>
    <path d="M-2,-23 Q0,-21 2,-23" stroke="#c47a5a" stroke-width="0.7" fill="none"/>
    <rect x="-5" y="-17" width="10" height="14" rx="3" fill="#e85d75"/>
    <line x1="-5" y1="-12" x2="-11" y2="-5" stroke="#FDDCB5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="-12" x2="11" y2="-5" stroke="#FDDCB5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-3" y1="-3" x2="-4" y2="8" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3" y1="-3" x2="4" y2="8" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Boden -->
  <rect x="0" y="240" width="120" height="40" fill="#2a4a1a"/>
</svg>
