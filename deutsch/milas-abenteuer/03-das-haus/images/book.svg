<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs><style>
    .bp{animation:bpa 4s ease-in-out infinite}@keyframes bpa{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
    .gl{animation:gla 3s ease-in-out infinite}@keyframes gla{0%,100%{opacity:.3}50%{opacity:.7}}
    .sp{animation:spa 2s ease-in-out infinite}@keyframes spa{0%,100%{opacity:0;transform:scale(.5) translateY(0)}50%{opacity:.6;transform:scale(1) translateY(-8px)}}
    .wg{animation:wga 3s ease-in-out infinite}@keyframes wga{0%,100%{fill:#ffd080}50%{fill:#ffe8b0}}
  </style></defs>
  <rect width="400" height="280" fill="#1a150a"/>
  <!-- Warmes Zimmer-Ambiente -->
  <circle cx="200" cy="150" r="140" fill="rgba(255,180,60,0.05)"/>
  <!-- Sessel -->
  <rect x="100" y="150" width="80" height="60" rx="10" fill="#8a4a2a"/>
  <rect x="85" y="145" width="30" height="70" rx="8" fill="#7a3a1a"/>
  <rect x="165" y="145" width="30" height="70" rx="8" fill="#7a3a1a"/>
  <!-- Oma sitzt -->
  <g transform="translate(140, 130)">
    <circle cx="0" cy="0" r="10" fill="#ddd"/>
    <rect x="-8" y="10" width="16" height="20" rx="4" fill="#6a5a8a"/>
    <circle cx="-3" cy="-2" r="1" fill="#3a3a3a"/><circle cx="3" cy="-2" r="1" fill="#3a3a3a"/>
    <path d="M-2,3 Q0,5 2,3" stroke="#8a6a5a" stroke-width="0.6" fill="none"/>
    <!-- Brille -->
    <circle cx="-3" cy="-2" r="3" fill="none" stroke="#8a8a8a" stroke-width="0.5"/>
    <circle cx="3" cy="-2" r="3" fill="none" stroke="#8a8a8a" stroke-width="0.5"/>
  </g>
  <!-- Mila sitzt neben Oma -->
  <g transform="translate(190, 145)">
    <ellipse cx="0" cy="-15" rx="7" ry="8" fill="#8B5E3C"/>
    <circle cx="0" cy="-16" r="6" fill="#FDDCB5"/>
    <circle cx="-2" cy="-17" r="1" fill="#3a2a1a"/><circle cx="2" cy="-17" r="1" fill="#3a2a1a"/>
    <rect x="-4" y="-9" width="8" height="12" rx="2" fill="#e85d75"/>
  </g>
  <!-- Großes goldenes Buch — das Herzstück -->
  <g transform="translate(240, 120)" class="bp">
    <!-- Buch-Körper -->
    <rect x="-30" y="-20" width="60" height="45" rx="3" fill="#d4a030"/>
    <rect x="-27" y="-17" width="54" height="39" rx="2" fill="#f5e6d3"/>
    <!-- Buch-Rücken -->
    <line x1="0" y1="-20" x2="0" y2="25" stroke="#c49020" stroke-width="3"/>
    <!-- Seiten-Linien -->
    <line x1="-20" y1="-8" x2="-5" y2="-8" stroke="#d4c0a0" stroke-width="0.8"/>
    <line x1="-20" y1="-2" x2="-5" y2="-2" stroke="#d4c0a0" stroke-width="0.8"/>
    <line x1="-20" y1="4" x2="-5" y2="4" stroke="#d4c0a0" stroke-width="0.8"/>
    <line x1="5" y1="-8" x2="22" y2="-8" stroke="#d4c0a0" stroke-width="0.8"/>
    <line x1="5" y1="-2" x2="22" y2="-2" stroke="#d4c0a0" stroke-width="0.8"/>
    <line x1="5" y1="4" x2="22" y2="4" stroke="#d4c0a0" stroke-width="0.8"/>
    <!-- Goldene Verzierung -->
    <circle cx="0" cy="15" r="4" fill="#d4a030" opacity="0.6"/>
  </g>
  <!-- Magische Buchstaben schweben aus dem Buch -->
  <text x="280" y="85" fill="#ffd700" font-size="16" opacity="0.4" class="sp">A</text>
  <text x="310" y="75" fill="#ffd700" font-size="12" opacity="0.3" class="sp" style="animation-delay:.5s">B</text>
  <text x="265" y="70" fill="#ffd700" font-size="14" opacity="0.3" class="sp" style="animation-delay:1s">C</text>
  <!-- Goldene Glühpunkte -->
  <circle cx="300" cy="100" r="2" fill="#ffd700" class="gl"/>
  <circle cx="260" cy="80" r="1.5" fill="#ffd700" class="gl" style="animation-delay:.7s"/>
  <circle cx="330" cy="90" r="1.8" fill="#ffd700" class="gl" style="animation-delay:1.3s"/>
  <!-- Fenster hinten -->
  <rect x="310" y="40" width="30" height="25" rx="2" class="wg"/>
  <line x1="325" y1="40" x2="325" y2="65" stroke="#a05a30" stroke-width="1.5"/>
  <line x1="310" y1="52" x2="340" y2="52" stroke="#a05a30" stroke-width="1.5"/>
  <!-- Boden -->
  <rect x="0" y="220" width="400" height="60" fill="#3a2a1a" rx="0"/>
</svg>
