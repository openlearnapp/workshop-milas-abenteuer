<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="rw" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="50%" stop-color="#2a5080"/><stop offset="100%" stop-color="#1e3a5f"/></linearGradient>
    <style>
      .wm{animation:wv 3s ease-in-out infinite}@keyframes wv{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
      .rp{animation:rr 2s ease-in-out infinite}@keyframes rr{0%,100%{opacity:.3}50%{opacity:.15;transform:translateX(6px)}}
      .fh{animation:fhp 3s ease-in-out infinite}@keyframes fhp{0%,70%,100%{transform:translateY(0)}80%{transform:translateY(-10px)}90%{transform:translateY(2px)}}
      .fj{animation:fjp 4s ease-in-out infinite 2s}@keyframes fjp{0%,80%,100%{opacity:0}85%{transform:translate(0,-15px);opacity:1}95%{transform:translate(3px,-20px) rotate(-15deg);opacity:1}}
    </style>
  </defs>
  <rect width="400" height="280" fill="#0f1e30"/>
  <path d="M0,180 Q100,165 200,175 Q300,185 400,170 L400,280 L0,280Z" fill="#2a4a1a"/>
  <path d="M0,170 Q100,155 200,165 Q300,175 400,160 L400,210 Q300,225 200,210 Q100,195 0,210Z" fill="url(#rw)" class="wm"/>
  <path d="M40,180 Q80,175 120,180" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" fill="none" class="rp"/>
  <path d="M200,175 Q240,170 280,175" stroke="rgba(100,180,255,0.25)" stroke-width="1.5" fill="none" class="rp" style="animation-delay:.5s"/>
  <ellipse cx="160" cy="182" rx="18" ry="8" fill="#5a6a5a"/>
  <!-- Fridolin (position wrapper + animation wrapper) -->
  <g transform="translate(160,165)"><g class="fh">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#3aaa4a"/>
    <circle cx="-4" cy="-7" r="4" fill="#3aaa4a"/><circle cx="4" cy="-7" r="4" fill="#3aaa4a"/>
    <circle cx="-4" cy="-8" r="2.5" fill="white"/><circle cx="4" cy="-8" r="2.5" fill="white"/>
    <circle cx="-3.5" cy="-8" r="1.2" fill="#1a3a1a"/><circle cx="4.5" cy="-8" r="1.2" fill="#1a3a1a"/>
    <path d="M-4,1 Q0,5 4,1" stroke="#1a5a2a" stroke-width="0.8" fill="none"/>
    <path d="M-6,-10 Q0,-16 6,-10" fill="#4a7af5"/>
  </g></g>
  <!-- Fisch -->
  <g class="fj"><path d="M80,180 Q85,175 90,180 L85,183Z" fill="#f0a050"/></g>
  <!-- Mila -->
  <g transform="translate(280,208)">
    <ellipse cx="0" cy="-28" rx="10" ry="12" fill="#8B5E3C"/>
    <circle cx="0" cy="-30" r="9" fill="#FDDCB5"/>
    <circle cx="-3" cy="-32" r="1.5" fill="#3a2a1a"/><circle cx="4" cy="-32" r="1.5" fill="#3a2a1a"/>
    <rect x="-6" y="-20" width="12" height="16" rx="3" fill="#e85d75"/>
    <line x1="-6" y1="-16" x2="-12" y2="-10" stroke="#FDDCB5" stroke-width="3" stroke-linecap="round"/>
    <line x1="6" y1="-16" x2="12" y2="-10" stroke="#FDDCB5" stroke-width="3" stroke-linecap="round"/>
    <line x1="-3" y1="-4" x2="-4" y2="8" stroke="#4a6fa5" stroke-width="3" stroke-linecap="round"/>
    <line x1="3" y1="-4" x2="4" y2="8" stroke="#4a6fa5" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
