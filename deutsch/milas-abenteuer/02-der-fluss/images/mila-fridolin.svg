<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs><style>
    .wb{animation:wb 3s ease-in-out infinite}@keyframes wb{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    .fh2{animation:fh2a 2s ease-in-out infinite}@keyframes fh2a{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .lf{animation:lfa 6s ease-in-out infinite}@keyframes lfa{0%{transform:translate(0,0) rotate(0);opacity:.5}100%{transform:translate(15px,180px) rotate(300deg);opacity:0}}
  </style></defs>
  <rect width="400" height="280" fill="#0f2318"/>
  <!-- Wald-Pfad -->
  <path d="M50,280 Q120,240 200,250 Q280,260 350,230" stroke="#5a4a30" stroke-width="10" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Bäume -->
  <polygon points="10,280 35,140 60,280" fill="#1a4a2a" opacity="0.5"/>
  <polygon points="340,280 365,150 390,280" fill="#1a4a2a" opacity="0.5"/>
  <polygon points="50,280 80,170 110,280" fill="#267a3a" opacity="0.4"/>
  <polygon points="300,280 325,160 350,280" fill="#267a3a" opacity="0.4"/>
  <!-- Mila und Fridolin zusammen auf dem Weg -->
  <g transform="translate(200, 225)" class="wb">
    <!-- Mila -->
    <g transform="translate(-15, 0)">
      <ellipse cx="0" cy="-28" rx="9" ry="11" fill="#8B5E3C"/>
      <circle cx="0" cy="-30" r="8" fill="#FDDCB5"/>
      <circle cx="-3" cy="-32" r="1.3" fill="#3a2a1a"/><circle cx="3" cy="-32" r="1.3" fill="#3a2a1a"/>
      <path d="M-2,-27 Q0,-25 2,-27" stroke="#c47a5a" stroke-width="0.7" fill="none"/>
      <rect x="-5" y="-20" width="10" height="14" rx="3" fill="#e85d75"/>
      <line x1="-5" y1="-16" x2="-10" y2="-10" stroke="#FDDCB5" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="5" y1="-16" x2="10" y2="-10" stroke="#FDDCB5" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-2" y1="-6" x2="-4" y2="6" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="2" y1="-6" x2="4" y2="6" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Fridolin hüpft neben Mila -->
    <g transform="translate(25, 8)"><g class="fh2">
      <ellipse cx="0" cy="0" rx="7" ry="5" fill="#3aaa4a"/>
      <circle cx="-3" cy="-5" r="3" fill="#3aaa4a"/><circle cx="3" cy="-5" r="3" fill="#3aaa4a"/>
      <circle cx="-3" cy="-6" r="1.8" fill="white"/><circle cx="3" cy="-6" r="1.8" fill="white"/>
      <circle cx="-2.5" cy="-6" r="0.9" fill="#1a3a1a"/><circle cx="3.5" cy="-6" r="0.9" fill="#1a3a1a"/>
      <path d="M-3,1 Q0,4 3,1" stroke="#1a5a2a" stroke-width="0.6" fill="none"/>
      <path d="M-4,-8 Q0,-12 4,-8" fill="#4a7af5"/>
    </g></g>
  </g>
  <!-- Sonnenstrahlen durch Bäume -->
  <line x1="150" y1="0" x2="170" y2="280" stroke="#ffd700" stroke-width="1" opacity="0.06"/>
  <line x1="250" y1="0" x2="230" y2="280" stroke="#ffd700" stroke-width="1" opacity="0.05"/>
  <!-- Fallende Blätter -->
  <ellipse cx="120" cy="40" rx="3" ry="1.5" fill="#4ade80" class="lf"/>
  <ellipse cx="280" cy="60" rx="3" ry="1.5" fill="#86efac" class="lf" style="animation-delay:2s"/>
</svg>
