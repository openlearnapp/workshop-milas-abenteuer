<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="50%" stop-color="#2a5a90"/><stop offset="100%" stop-color="#1e3a5f"/></linearGradient>
    <style>
      .wv{animation:wave 3s ease-in-out infinite}@keyframes wave{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
      .hair{animation:hb 3s ease-in-out infinite}@keyframes hb{0%,100%{transform:rotate(0)}50%{transform:rotate(2deg)}}
      .rfl{animation:rf 2s ease-in-out infinite}@keyframes rf{0%,100%{opacity:.2}50%{opacity:.5}}
    </style>
  </defs>
  <rect width="400" height="280" fill="#0f1e30"/>
  <!-- Ufer links -->
  <path d="M0,160 Q80,150 150,165 L150,280 L0,280Z" fill="#2a4a1a"/>
  <!-- Gras -->
  <line x1="30" y1="165" x2="28" y2="150" stroke="#4a8a3a" stroke-width="2"/>
  <line x1="50" y1="160" x2="48" y2="145" stroke="#3a7a2a" stroke-width="2"/>
  <line x1="80" y1="158" x2="76" y2="143" stroke="#4a8a3a" stroke-width="2"/>
  <!-- Wasser -->
  <path d="M150,165 Q200,155 250,160 Q300,165 350,155 Q380,150 400,155 L400,280 L150,280Z" fill="url(#water)" class="wv"/>
  <!-- Wasser-Reflexionen -->
  <path d="M200,180 Q220,176 240,180" stroke="rgba(100,180,255,0.3)" stroke-width="1.5" fill="none" class="rfl"/>
  <path d="M280,190 Q300,186 320,190" stroke="rgba(100,180,255,0.25)" stroke-width="1.5" fill="none" class="rfl" style="animation-delay:.8s"/>
  <path d="M180,210 Q200,206 220,210" stroke="rgba(100,180,255,0.2)" stroke-width="1" fill="none" class="rfl" style="animation-delay:1.5s"/>
  <!-- Steine -->
  <ellipse cx="160" cy="175" rx="12" ry="6" fill="#5a6a5a"/>
  <ellipse cx="140" cy="180" rx="8" ry="4" fill="#4a5a4a"/>
  <!-- Mila sitzt am Ufer -->
  <g transform="translate(100,155)">
    <ellipse cx="0" cy="-20" rx="8" ry="10" fill="#8B5E3C" class="hair"/>
    <circle cx="0" cy="-22" r="7" fill="#FDDCB5"/>
    <circle cx="-2" cy="-24" r="1.2" fill="#3a2a1a"/><circle cx="3" cy="-24" r="1.2" fill="#3a2a1a"/>
    <path d="M-2,-20 Q0,-18 2,-20" stroke="#c47a5a" stroke-width="0.6" fill="none"/>
    <rect x="-5" y="-14" width="10" height="12" rx="2" fill="#e85d75"/>
    <line x1="-5" y1="-10" x2="-10" y2="-2" stroke="#FDDCB5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="-10" x2="10" y2="-4" stroke="#FDDCB5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-3" y1="-2" x2="-8" y2="5" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3" y1="-2" x2="8" y2="5" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Sterne -->
  <circle cx="300" cy="40" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="350" cy="60" r="1" fill="#fff" opacity="0.4"/>
</svg>
