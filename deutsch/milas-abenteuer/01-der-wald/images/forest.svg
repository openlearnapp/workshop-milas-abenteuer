<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <radialGradient id="sg" cx="75%" cy="20%"><stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a3e"/><stop offset="100%" stop-color="#0f2318"/></linearGradient>
    <style>
      .m-hair{animation:hb 3s ease-in-out infinite}@keyframes hb{0%,100%{transform:rotate(0)}50%{transform:rotate(3deg)}}
      .m-arm{animation:as .9s ease-in-out infinite;transform-origin:-6px -16px}@keyframes as{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
      .m-leg{animation:lw .8s ease-in-out infinite;transform-origin:-3px -4px}@keyframes lw{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
      .bf{animation:bm 7s linear infinite}@keyframes bm{0%{transform:translate(0,0)}100%{transform:translate(150px,-20px);opacity:0}}
      .lf{animation:lfall 6s ease-in-out infinite}@keyframes lfall{0%{transform:translate(0,0) rotate(0);opacity:.6}100%{transform:translate(20px,200px) rotate(360deg);opacity:0}}
      .sp{animation:spk 3s ease-in-out infinite}@keyframes spk{0%,100%{opacity:.8}50%{opacity:0}}
    </style>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <circle cx="310" cy="55" r="80" fill="url(#sg)"/>
  <circle cx="310" cy="55" r="14" fill="#ffd700" opacity="0.9"/>
  <!-- Bäume hinten -->
  <polygon points="50,280 70,120 90,280" fill="#1a4a2a" opacity="0.6"/>
  <polygon points="120,280 145,100 170,280" fill="#1a4a2a" opacity="0.5"/>
  <polygon points="200,280 220,130 240,280" fill="#1a4a2a" opacity="0.6"/>
  <polygon points="300,280 325,110 350,280" fill="#1a4a2a" opacity="0.5"/>
  <!-- Bäume vorne -->
  <polygon points="20,280 55,90 90,280" fill="#2d6b3f"/>
  <polygon points="80,280 110,140 140,280" fill="#267a3a"/>
  <polygon points="330,280 360,100 390,280" fill="#2d6b3f"/>
  <!-- Pfad -->
  <path d="M180,280 Q200,245 220,225 Q240,205 260,190" stroke="#5a4a30" stroke-width="8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Mila -->
  <g transform="translate(185,232)">
    <ellipse cx="0" cy="-28" rx="10" ry="12" fill="#8B5E3C"/>
    <path d="M-8,-30 Q-12,-15 -10,-5" stroke="#8B5E3C" stroke-width="4" fill="none" class="m-hair"/>
    <circle cx="0" cy="-30" r="9" fill="#FDDCB5"/>
    <circle cx="-3" cy="-32" r="1.5" fill="#3a2a1a"/><circle cx="4" cy="-32" r="1.5" fill="#3a2a1a"/>
    <path d="M-3,-27 Q0,-24 3,-27" stroke="#c47a5a" stroke-width="0.8" fill="none"/>
    <rect x="-6" y="-20" width="12" height="16" rx="3" fill="#e85d75"/>
    <line x1="-6" y1="-16" x2="-14" y2="-8" stroke="#FDDCB5" stroke-width="3" stroke-linecap="round" class="m-arm"/>
    <line x1="6" y1="-16" x2="14" y2="-8" stroke="#FDDCB5" stroke-width="3" stroke-linecap="round"/>
    <line x1="-3" y1="-4" x2="-5" y2="8" stroke="#4a6fa5" stroke-width="3" stroke-linecap="round" class="m-leg"/>
    <line x1="3" y1="-4" x2="5" y2="8" stroke="#4a6fa5" stroke-width="3" stroke-linecap="round"/>
    <rect x="5" y="-18" width="6" height="9" rx="2" fill="#d4a030" opacity="0.8"/>
  </g>
  <!-- Vögel -->
  <g class="bf"><path d="M140,60 Q145,52 150,60" stroke="#f5e6d3" stroke-width="1.5" fill="none"/><path d="M155,45 Q160,37 165,45" stroke="#f5e6d3" stroke-width="1.5" fill="none"/></g>
  <!-- Blätter -->
  <ellipse cx="100" cy="50" rx="4" ry="2" fill="#4ade80" opacity="0.6" class="lf"/>
  <ellipse cx="250" cy="30" rx="3" ry="1.5" fill="#86efac" opacity="0.5" class="lf" style="animation-delay:2s"/>
  <!-- Sparkles -->
  <circle cx="160" cy="190" r="2" fill="#ffd700" class="sp"/>
  <circle cx="210" cy="195" r="1.5" fill="#ffd700" class="sp" style="animation-delay:1s"/>
</svg>
