<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8c42"/><stop offset="40%" stop-color="#e85d75"/><stop offset="100%" stop-color="#1a1a3e"/></linearGradient>
    <style>
      .glow{animation:gl 3s ease-in-out infinite}@keyframes gl{0%,100%{opacity:.4}50%{opacity:.8}}
      .m-arm{animation:wave 1s ease-in-out infinite;transform-origin:6px -16px}@keyframes wave{0%,100%{transform:rotate(0)}50%{transform:rotate(-15deg)}}
    </style>
  </defs>
  <rect width="400" height="280" fill="url(#dawn)"/>
  <!-- Boden -->
  <path d="M0,200 Q100,190 200,200 Q300,210 400,195 L400,280 L0,280Z" fill="#2a4a1a"/>
  <!-- Zwei Wege -->
  <path d="M200,220 Q160,240 120,260 Q100,270 80,280" stroke="#5a4a30" stroke-width="10" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M200,220 Q240,240 280,255 Q310,265 340,280" stroke="#5a4a30" stroke-width="10" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Wegweiser -->
  <line x1="200" y1="180" x2="200" y2="220" stroke="#6a5a3a" stroke-width="4"/>
  <rect x="150" y="172" width="50" height="14" rx="2" fill="#7a6a4a" transform="rotate(-8 175 179)"/>
  <rect x="200" y="178" width="50" height="14" rx="2" fill="#7a6a4a" transform="rotate(8 225 185)"/>
  <!-- Bäume links (zum Fluss) -->
  <polygon points="30,200 50,130 70,200" fill="#2d6b3f"/>
  <polygon points="60,200 85,110 110,200" fill="#267a3a"/>
  <!-- Bäume rechts (zum Haus) -->
  <polygon points="310,200 335,120 360,200" fill="#2d6b3f"/>
  <polygon points="340,195 360,115 380,195" fill="#267a3a"/>
  <!-- Mila am Wegweiser -->
  <g transform="translate(195,195)">
    <ellipse cx="0" cy="-22" rx="8" ry="10" fill="#8B5E3C"/>
    <circle cx="0" cy="-24" r="7" fill="#FDDCB5"/>
    <circle cx="-2" cy="-26" r="1.2" fill="#3a2a1a"/><circle cx="3" cy="-26" r="1.2" fill="#3a2a1a"/>
    <rect x="-5" y="-16" width="10" height="12" rx="2" fill="#e85d75"/>
    <line x1="-5" y1="-12" x2="-10" y2="-6" stroke="#FDDCB5" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="-12" x2="10" y2="-6" stroke="#FDDCB5" stroke-width="2" stroke-linecap="round" class="m-arm"/>
    <line x1="-3" y1="-4" x2="-4" y2="6" stroke="#4a6fa5" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-4" x2="4" y2="6" stroke="#4a6fa5" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Glühwürmchen -->
  <circle cx="80" cy="170" r="2" fill="#ffd700" class="glow"/>
  <circle cx="320" cy="160" r="2" fill="#ffd700" class="glow" style="animation-delay:1s"/>
  <circle cx="150" cy="150" r="1.5" fill="#ffd700" class="glow" style="animation-delay:.5s"/>
</svg>
