<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a1a4e"/><stop offset="100%" stop-color="#4a3060"/></linearGradient>
    <style>
      .smoke{animation:sm 4s ease-in-out infinite}@keyframes sm{0%{transform:translateY(0);opacity:.4}100%{transform:translateY(-30px);opacity:0}}
      .star{animation:tw 2s ease-in-out infinite}@keyframes tw{0%,100%{opacity:.3}50%{opacity:1}}
      .m-arm{animation:wave 1.2s ease-in-out infinite;transform-origin:6px -16px}@keyframes wave{0%,100%{transform:rotate(0)}50%{transform:rotate(-20deg)}}
    </style>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- Sterne -->
  <circle cx="50" cy="40" r="1.5" fill="#fff" class="star"/>
  <circle cx="150" cy="25" r="1" fill="#fff" class="star" style="animation-delay:.7s"/>
  <circle cx="320" cy="50" r="1.5" fill="#fff" class="star" style="animation-delay:1.2s"/>
  <circle cx="250" cy="30" r="1" fill="#fff" class="star" style="animation-delay:.3s"/>
  <!-- Boden -->
  <rect x="0" y="200" width="400" height="80" fill="#2a4a1a"/>
  <!-- Häuser -->
  <g transform="translate(60,140)">
    <rect x="0" y="0" width="50" height="60" fill="#8a6a4a" rx="2"/>
    <polygon points="-5,0 25,-25 55,0" fill="#c44a2a"/>
    <rect x="18" y="25" width="14" height="35" fill="#5a4a30"/>
    <rect x="7" y="10" width="10" height="10" fill="#ffd700" opacity="0.7"/>
    <rect x="33" y="10" width="10" height="10" fill="#ffd700" opacity="0.7"/>
    <circle cx="40" cy="-10" r="4" fill="#aaa" opacity="0.4" class="smoke"/>
  </g>
  <g transform="translate(150,150)">
    <rect x="0" y="0" width="45" height="50" fill="#7a8a6a" rx="2"/>
    <polygon points="-5,0 22,-22 50,0" fill="#a03a2a"/>
    <rect x="15" y="20" width="12" height="30" fill="#4a3a20"/>
    <rect x="5" y="8" width="8" height="8" fill="#ffd700" opacity="0.6"/>
  </g>
  <!-- Blumen -->
  <circle cx="120" cy="210" r="3" fill="#ff6b9d"/><circle cx="130" cy="215" r="3" fill="#ffb347"/>
  <circle cx="200" cy="212" r="3" fill="#ff6b9d"/><circle cx="240" cy="208" r="3" fill="#87ceeb"/>
  <!-- Mila am Fenster -->
  <g transform="translate(300,175)">
    <rect x="-20" y="0" width="40" height="30" fill="#6a5a3a" rx="2"/>
    <rect x="-8" y="5" width="16" height="12" fill="#3a5a8a"/>
    <circle cx="0" cy="8" r="5" fill="#FDDCB5"/>
    <circle cx="-2" cy="7" r="1" fill="#3a2a1a"/><circle cx="2" cy="7" r="1" fill="#3a2a1a"/>
    <ellipse cx="0" cy="3" rx="6" ry="4" fill="#8B5E3C"/>
    <line x1="8" y1="10" x2="16" y2="4" stroke="#FDDCB5" stroke-width="2" stroke-linecap="round" class="m-arm"/>
  </g>
</svg>
