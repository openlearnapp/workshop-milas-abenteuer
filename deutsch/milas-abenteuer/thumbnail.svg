<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a2d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky and forest background -->
  <rect width="1280" height="800" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle cx="200" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="450" cy="120" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="700" cy="60" r="2" fill="white" opacity="0.6"/>
  <circle cx="950" cy="100" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1100" cy="70" r="2" fill="white" opacity="0.7"/>
  <circle cx="350" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="850" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1050" cy="130" r="1" fill="white" opacity="0.4"/>

  <!-- Moon -->
  <circle cx="1050" cy="150" r="45" fill="#ffe8a0" opacity="0.85"/>
  <circle cx="1065" cy="140" r="40" fill="url(#skyGrad)" opacity="0.8"/>

  <!-- Far trees -->
  <polygon points="80,500 120,300 160,500" fill="#1a3a1a" opacity="0.6"/>
  <polygon points="180,500 230,250 280,500" fill="#164a16" opacity="0.5"/>
  <polygon points="1000,500 1050,280 1100,500" fill="#1a3a1a" opacity="0.6"/>
  <polygon points="1100,500 1150,320 1200,500" fill="#164a16" opacity="0.5"/>

  <!-- Ground -->
  <rect y="500" width="1280" height="300" fill="#1e3a1e"/>

  <!-- Path through forest -->
  <path d="M640,800 Q620,700 600,600 Q580,550 640,500" fill="none" stroke="#3a5a3a" stroke-width="40" stroke-linecap="round" opacity="0.5"/>

  <!-- Near trees -->
  <polygon points="40,500 90,200 140,500" fill="#1e4d1e"/>
  <rect x="80" y="500" width="20" height="60" fill="#3a2a1a"/>
  <polygon points="300,500 360,180 420,500" fill="#1a4a1a"/>
  <rect x="350" y="500" width="20" height="50" fill="#3a2a1a"/>
  <polygon points="860,500 920,220 980,500" fill="#1e4d1e"/>
  <rect x="910" y="500" width="20" height="55" fill="#3a2a1a"/>
  <polygon points="1140,500 1190,250 1240,500" fill="#1a4a1a"/>
  <rect x="1180" y="500" width="20" height="50" fill="#3a2a1a"/>

  <!-- Mila silhouette (small girl figure on the path) -->
  <circle cx="640" cy="460" r="14" fill="#e8c090"/>
  <!-- Hair -->
  <ellipse cx="640" cy="453" rx="16" ry="12" fill="#5a3020"/>
  <!-- Body/dress -->
  <polygon points="625,475 640,520 655,475" fill="#cc4466"/>
  <rect x="632" y="472" width="16" height="20" rx="3" fill="#cc4466"/>
  <!-- Legs -->
  <line x1="635" y1="518" x2="632" y2="538" stroke="#e8c090" stroke-width="4" stroke-linecap="round"/>
  <line x1="645" y1="518" x2="648" y2="538" stroke="#e8c090" stroke-width="4" stroke-linecap="round"/>

  <!-- Fireflies / magic particles -->
  <circle cx="550" cy="420" r="3" fill="#ffe066" opacity="0.8"/>
  <circle cx="720" cy="380" r="2" fill="#ffe066" opacity="0.6"/>
  <circle cx="480" cy="350" r="2.5" fill="#ffe066" opacity="0.7"/>
  <circle cx="780" cy="440" r="2" fill="#ffe066" opacity="0.5"/>
  <circle cx="600" cy="300" r="3" fill="#ffe066" opacity="0.6"/>
  <circle cx="690" cy="330" r="2" fill="#ffe066" opacity="0.7"/>

  <!-- Center card -->
  <rect x="290" y="540" width="700" height="220" rx="20" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Title -->
  <text x="640" y="630" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="bold"
        text-anchor="middle" fill="white" letter-spacing="3">Milas Abenteuer</text>

  <!-- Subtitle -->
  <text x="640" y="690" font-family="Arial, Helvetica, sans-serif" font-size="30"
        text-anchor="middle" fill="rgba(255,255,255,0.75)" letter-spacing="2">Eine interaktive Geschichte</text>

  <!-- Bottom line -->
  <rect x="520" y="720" width="240" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>

  <!-- Small label -->
  <text x="640" y="750" font-family="Arial, Helvetica, sans-serif" font-size="20"
        text-anchor="middle" fill="rgba(255,255,255,0.5)" letter-spacing="3">OPEN LEARN</text>
</svg>
